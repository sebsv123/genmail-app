name: Deploy GenMail

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 20
  PNPM_VERSION: 9

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # TESTS
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm turbo run lint

      - name: Type check
        run: pnpm turbo run typecheck

      - name: Run tests
        run: pnpm turbo run test

  # ────────────────────────────────────────────────────────────────────────────
  # DEPLOY FRONTEND (Vercel)
  # ────────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm turbo run build --filter=web

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: apps/web
          vercel-args: '--prod'

  # ────────────────────────────────────────────────────────────────────────────
  # DEPLOY BACKEND (VPS)
  # ────────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (VPS)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            echo "🚀 Starting deploy at $(date)"
            
            cd /opt/genmail
            
            # Pull latest changes
            echo "📥 Pulling latest code..."
            git pull origin main
            
            # Export environment variables
            echo "🔐 Loading environment..."
            export $(grep -v '^#' .env.production | xargs)
            
            # Build and deploy services
            echo "🐳 Building and starting services..."
            docker compose -f infra/docker-compose.prod.yml build ai-service worker
            docker compose -f infra/docker-compose.prod.yml up -d --remove-orphans
            
            # Wait for services to be healthy
            echo "⏳ Waiting for services..."
            sleep 30
            
            # Run migrations
            echo "🗄️ Running database migrations..."
            docker compose -f infra/docker-compose.prod.yml exec -T worker npx prisma migrate deploy --schema=/app/packages/db/prisma/schema.prisma || true
            
            # Cleanup
            echo "🧹 Cleaning up..."
            docker system prune -f
            
            echo "✅ Deploy completed successfully at $(date)"

  # ────────────────────────────────────────────────────────────────────────────
  # NOTIFY
  # ────────────────────────────────────────────────────────────────────────────
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: failure()
    steps:
      - name: Send notification
        run: |
          echo "❌ Deploy failed for commit ${{ github.sha }}"
          # Add Slack/Discord notification here if needed
