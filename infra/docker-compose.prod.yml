version: '3.9'

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: genmail-postgres
    restart: always
    environment:
      POSTGRES_DB: genmail
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - genmail-network

  # ── Redis ──────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: genmail-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - genmail-network

  # ── Listmonk ───────────────────────────────────────────────────────────────────
  listmonk:
    image: listmonk/listmonk:latest
    container_name: genmail-listmonk
    restart: always
    ports:
      - "9000:9000"
    environment:
      LISTMONK_app__address: 0.0.0.0:9000
      LISTMONK_db__host: postgres
      LISTMONK_db__port: 5432
      LISTMONK_db__user: ${POSTGRES_USER}
      LISTMONK_db__password: ${POSTGRES_PASSWORD}
      LISTMONK_db__database: listmonk
      LISTMONK_db__ssl_mode: disable
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - listmonk_data:/listmonk
    networks:
      - genmail-network

  # ── AI Service ─────────────────────────────────────────────────────────────────
  ai-service:
    build:
      context: ../apps/ai-service
      dockerfile: Dockerfile
    container_name: genmail-ai
    restart: always
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      EMBEDDING_MODE: ${EMBEDDING_MODE:-local}
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - genmail-network

  # ── Worker ─────────────────────────────────────────────────────────────────────
  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    container_name: genmail-worker
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      AI_SERVICE_URL: http://ai-service:8000
      LISTMONK_BASE_URL: http://listmonk:9000
      LISTMONK_USERNAME: ${LISTMONK_USERNAME}
      LISTMONK_PASSWORD: ${LISTMONK_PASSWORD}
      APOLLO_API_KEY: ${APOLLO_API_KEY:-}
      HUNTER_API_KEY: ${HUNTER_API_KEY:-}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - genmail-network

  # ── Nginx ──────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: genmail-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/genmail.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_data:/etc/letsencrypt:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - listmonk
      - ai-service
    networks:
      - genmail-network

  # ── Certbot ────────────────────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: genmail-certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - ./nginx/html:/usr/share/nginx/html
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h; done'"
    networks:
      - genmail-network

volumes:
  postgres_data:
  redis_data:
  listmonk_data:
  certbot_data:

networks:
  genmail-network:
    driver: bridge
