version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: genmail-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: genmail
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: genmail-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ../apps/ai-service
      dockerfile: Dockerfile
    container_name: genmail-ai
    restart: always
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      EMBEDDING_MODE: local
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  listmonk:
    image: listmonk/listmonk:latest
    container_name: genmail-listmonk
    ports:
      - "9000:9000"
    environment:
      LISTMONK_app__address: "0.0.0.0:9000"
      LISTMONK_app__admin_username: admin
      LISTMONK_app__admin_password: admin
      LISTMONK_db__host: postgres
      LISTMONK_db__port: 5432
      LISTMONK_db__user: postgres
      LISTMONK_db__password: postgres
      LISTMONK_db__database: genmail
      LISTMONK_db__ssl_mode: disable
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - listmonk_data:/listmonk

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    container_name: genmail-worker
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/genmail
      - REDIS_URL=redis://redis:6379/0
      - AI_SERVICE_URL=http://ai-service:8000
      - LISTMONK_BASE_URL=http://listmonk:9000
      - LISTMONK_USERNAME=admin
      - LISTMONK_PASSWORD=admin
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  listmonk_data:
