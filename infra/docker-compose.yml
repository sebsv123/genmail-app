services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: genmail-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: genmail
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: genmail-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ../apps/ai-service
      dockerfile: Dockerfile
    container_name: genmail-ai
    restart: always
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
    env_file:
      - ../.env
    environment:
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-nano}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      XAI_MODEL: ${XAI_MODEL:-grok-2-latest}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      EMBEDDING_MODE: local
      # Override URLs for Docker networking
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/genmail
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 6g
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    container_name: genmail-worker
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/genmail
      REDIS_URL: redis://redis:6379/0
      AI_SERVICE_URL: http://ai-service:8000
      LISTMONK_BASE_URL: http://listmonk:9000
      NODE_ENV: production
      SEED_SECTORS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    restart: unless-stopped

  watchdog:
    build:
      context: ../apps/watchdog
      dockerfile: Dockerfile
    container_name: genmail-watchdog
    restart: always
    ports:
      - "8001:8001"
    env_file:
      - ../.env
    environment:
      AI_SERVICE_URL: http://ai-service:8000
      WORKER_URL: http://worker:3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/genmail
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      WATCHDOG_INTERVAL_SECONDS: ${WATCHDOG_INTERVAL_SECONDS:-60}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  listmonk:
    image: listmonk/listmonk:latest
    container_name: genmail-listmonk
    ports:
      - "9000:9000"
    environment:
      LISTMONK_app__address: "0.0.0.0:9000"
      LISTMONK_app__admin_username: admin
      LISTMONK_app__admin_password: admin
      LISTMONK_db__host: postgres
      LISTMONK_db__port: 5432
      LISTMONK_db__user: postgres
      LISTMONK_db__password: postgres
      LISTMONK_db__database: genmail
      LISTMONK_db__ssl_mode: disable
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - listmonk_data:/listmonk

volumes:
  postgres_data:
  redis_data:
  listmonk_data:
  hf_cache:
