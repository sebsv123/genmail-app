version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: genmail-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: genmail
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: genmail-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  listmonk:
    image: listmonk/listmonk:latest
    container_name: genmail-listmonk
    ports:
      - "9000:9000"
    environment:
      LISTMONK_app__address: "0.0.0.0:9000"
      LISTMONK_app__admin_username: admin
      LISTMONK_app__admin_password: admin
      LISTMONK_db__host: postgres
      LISTMONK_db__port: 5432
      LISTMONK_db__user: postgres
      LISTMONK_db__password: postgres
      LISTMONK_db__database: genmail
      LISTMONK_db__ssl_mode: disable
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - listmonk_data:/listmonk

volumes:
  postgres_data:
  redis_data:
  listmonk_data:
