# GenMail Production Nginx Configuration

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=ai:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=webhooks:10m rate=100r/s;

# AI Service - ai.genmail.app
server {
    listen 80;
    server_name ai.genmail.app;
    
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name ai.genmail.app;

    ssl_certificate /etc/letsencrypt/live/ai.genmail.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai.genmail.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        limit_req zone=ai burst=20 nodelay;
        
        proxy_pass http://ai-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# Listmonk - mail.genmail.app
server {
    listen 80;
    server_name mail.genmail.app;
    
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name mail.genmail.app;

    ssl_certificate /etc/letsencrypt/live/mail.genmail.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mail.genmail.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 25M;

    location / {
        proxy_pass http://listmonk:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support for live updates
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Default - catch-all
server {
    listen 80 default_server;
    server_name _;
    
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }
    
    location / {
        return 444;
    }
}
